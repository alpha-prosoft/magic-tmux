set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g mouse on
set-window-option -g mode-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -sel clip 2>/dev/null || pbcopy"
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -sel clip 2>/dev/null || pbcopy"

# Pane border
set -g pane-border-status top
set -g pane-border-format "#P"

# Split panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Window naming - auto-update based on first pane directory
set-option -g automatic-rename off
set-option -g allow-rename on
set-option -g status-interval 1
set-option -g focus-events on

# Tmux hooks for window naming (uses MAGIC_IDE_HOME env var)
set-hook -g after-split-window     'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'
set-hook -g after-new-window       'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'
set-hook -g after-new-session      'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'
set-hook -g pane-focus-in          'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'
set-hook -g window-pane-changed    'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'
set-hook -g client-attached        'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'
set-hook -g client-session-changed 'run-shell "$MAGIC_IDE_HOME/scripts/update-tmux-window-name.sh"'

# Plugin path
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.1'

# Theme
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Status bar
set -g status-position top
set -g status-right-length 200
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -g status on
set -g @catppuccin_window_current_text " #{b:window_name}"
set -g @catppuccin_window_text " #{b:window_name}"

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'
